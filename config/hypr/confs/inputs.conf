# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = es
    kb_variant = winkeys
    kb_model =
    kb_options =
    kb_rules =

    left_handed = false

    follow_mouse = 1

    tablet {
      output = HDMI-A-1
      region_size = 1920 1080
      region_size = 29376 16524
      region_position = 0 0
      active_area_size = 293.76 165.24
      transform = 0
    }

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}


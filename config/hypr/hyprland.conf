source = ~/.config/colors/hypr.conf
source = ~/.config/hypr/confs/binds.conf
#source = ~/.config/hypr/confs/monitors.conf
source = ~/.config/hypr/confs/execs.conf
source = ~/.config/hypr/confs/envs.conf
source = ~/.config/hypr/confs/inputs.conf
source = ~/.config/hypr/confs/windowrules.conf
source = ~/.config/hypr/confs/layerrules.conf
#source = ~/.config/hypr/confs/workspaces.conf

general {
  gaps_in = 4
  gaps_out = 4
  border_size = 2
  col.active_border = $gray9 $gray5 $gray9 45deg
  col.inactive_border = $gray3
  resize_on_border = true
  layout = dwindle

  allow_tearing = false
}

decoration {
  rounding = 2
  blur {
    enabled = true
    xray = false
    size = 2
    passes = 4
    new_optimizations = true
    ignore_opacity = true
  }

  active_opacity = 1
  inactive_opacity = 1
  fullscreen_opacity = 1

  shadow {
    enabled = true
    range = 16
    render_power = 1
    color = rgba(22222288)
    color_inactive = rgba(22222244)
    ignore_window = true
    offset = 0 8
  }
}

animations {
  enabled = true

  bezier = myBezier, 0.05, 0.9, 0.1, 1.05

  animation = windows, 1, 7, myBezier
  animation = windowsOut, 1, 7, default, popin 80%
  animation = border, 1, 10, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 7, default
  animation = workspaces, 1, 6, default
  animation = specialWorkspace, 1, 7, myBezier, slidevert
}

dwindle {
  pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = yes # you probably want this
}

master {
  # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
  new_status = master
  orientation = left
  new_on_top = true
  drop_at_cursor = false
}

xwayland {
  force_zero_scaling = true
}

gesture = 3, horizontal, workspace

misc {
  force_default_wallpaper = -1 # Set to 0 to disable the anime mascot wallpapers
}
